syntax = "proto3";

package vassago;

option go_package = "github.com/aj-nt/vassago-sdk/proto";

// Messaging Service for platform-agnostic messaging
service Messaging {
  // Send a message to a target channel/user
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  
  // List available channels for the platform
  rpc ListChannels(ListChannelsRequest) returns (ListChannelsResponse);
  
  // Subscribe to incoming messages (stream)
  rpc SubscribeToMessages(SubscribeToMessagesRequest) returns (stream MessageEvent);
}

// --- Messages ---

message SendMessageRequest {
  string platform = 1;           // "discord", "telegram", etc.
  string target = 2;             // Channel ID, user ID, or channel name
  string message = 3;            // Message content
  string agent_id = 4;           // Agent sending the message
}

message SendMessageResponse {
  bool success = 1;
  string message_id = 2;         // Platform-specific message ID
  string error = 3;              // Error message if any
}

message ListChannelsRequest {
  string platform = 1;           // "discord", "telegram", etc.
}

message ListChannelsResponse {
  repeated Channel channels = 1;
}

message Channel {
  string id = 1;                 // Platform-specific channel ID
  string name = 2;               // Human-readable name
  string platform = 3;           // "discord", "telegram", etc.
}

message SubscribeToMessagesRequest {
  string platform = 1;           // "discord", "telegram", etc.
  string agent_id = 2;           // Agent subscribing to messages
}

message MessageEvent {
  string platform = 1;           // "discord", "telegram", etc.
  string channel_id = 2;         // Channel where the message was received
  string channel_name = 3;       // Human-readable channel name
  string sender_id = 4;          // User ID of the sender
  string sender_name = 5;        // Human-readable sender name
  string message = 6;            // Message content
  int64 timestamp = 7;           // Unix timestamp
  string message_id = 8;         // Platform-specific message ID
}
