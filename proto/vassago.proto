syntax = "proto3";

package vassago;

option go_package = "github.com/aj-nt/vassago-sdk/proto";

// Vassago — Shared Memory Daemon for AI Agents
// gRPC service definition

service Vassago {
  // Health check
  rpc Ping(HealthCheckRequest) returns (HealthCheckResponse);

  // Memory CRUD
  rpc AddMemory(AddMemoryRequest) returns (AddMemoryResponse);
  rpc GetMemory(GetMemoryRequest) returns (MemoryEntry);
  rpc UpdateMemory(UpdateMemoryRequest) returns (MemoryEntry);
  rpc RemoveMemory(RemoveMemoryRequest) returns (RemoveMemoryResponse);
  rpc ListMemories(ListMemoriesRequest) returns (MemoryList);

  // Search
  rpc Search(SearchRequest) returns (SearchResponse);
  rpc SearchSessions(SearchSessionsRequest) returns (SearchSessionsResponse);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);

  // Hot block — per-agent computed context
  rpc GetHotBlock(HotBlockRequest) returns (HotBlockResponse);

  // Session lifecycle
  rpc CreateSession(CreateSessionRequest) returns (Session);
  rpc AddMessages(AddMessagesRequest) returns (Session);
  rpc EndSession(EndSessionRequest) returns (EndSessionResponse);
  rpc GetSession(GetSessionRequest) returns (Session);

  // Consolidation
  rpc Consolidate(ConsolidateRequest) returns (ConsolidateResponse);
  rpc GetConsolidationCandidates(GetConsolidationCandidatesRequest) returns (ConsolidationCandidatesResponse);

  // Pub/sub — agent subscribes to memory changes
  rpc Subscribe(SubscribeRequest) returns (stream UpdateEvent);

	// --- Agent Management ---
	rpc RegisterAgent(RegisterAgentRequest) returns (RegisterAgentResponse);
	rpc Heartbeat(AgentId) returns (Empty);

	// --- Chat API ---
	// ChatStream sends a message to an agent session and streams back the
	// response in real-time, including text chunks, tool calls, and status events.
	rpc ChatStream(ChatRequest) returns (stream ChatEvent);

  // --- Todo Management ---
  rpc AddTodo(AddTodoRequest) returns (TodoItem);
  rpc ListTodos(ListTodosRequest) returns (stream TodoItem);
  rpc CompleteTodo(CompleteTodoRequest) returns (TodoItem);
  rpc RemoveTodo(RemoveTodoRequest) returns (Empty);

  // --- Skill Management ---
  rpc AddSkill(AddSkillRequest) returns (SkillEntry);
  rpc GetSkill(GetSkillRequest) returns (SkillEntry);
  rpc ListSkills(ListSkillsRequest) returns (SkillList);
  rpc RemoveSkill(RemoveSkillRequest) returns (RemoveSkillResponse);
  rpc SearchSkills(SearchSkillsRequest) returns (SkillList);

  // --- Saved Tool Management ---
  rpc AddSavedTool(AddSavedToolRequest) returns (SavedToolEntry);
  rpc GetSavedTool(GetSavedToolRequest) returns (SavedToolEntry);
  rpc ListSavedTools(ListSavedToolsRequest) returns (SavedToolList);
  rpc SearchSavedTools(SearchSavedToolsRequest) returns (SavedToolList);
  rpc UpdateSavedTool(UpdateSavedToolRequest) returns (SavedToolEntry);
  rpc RemoveSavedTool(RemoveSavedToolRequest) returns (RemoveSavedToolResponse);

  // --- Peer Replication ---
  // SyncChanges returns memory deltas since a given timestamp for a namespace.
  // Peer daemons call this to pull changes during replication.
  rpc SyncChanges(SyncChangesRequest) returns (SyncChangesResponse);

  // --- Task Management (Multi-Agent Orchestration) ---
  rpc AddTask(AddTaskRequest) returns (TaskEntry);
  rpc GetTask(GetTaskRequest) returns (TaskEntry);
  rpc ClaimTask(ClaimTaskRequest) returns (TaskEntry);
  rpc CompleteTask(CompleteTaskRequest) returns (TaskEntry);
  rpc FailTask(FailTaskRequest) returns (TaskEntry);
  rpc FindReadyTasks(FindReadyTasksRequest) returns (TaskList);
  rpc ListTasksByStatus(ListTasksByStatusRequest) returns (TaskList);
  rpc ResetTimedOutTasks(ResetTimedOutTasksRequest) returns (ResetTimedOutTasksResponse);
  rpc DeleteTask(DeleteTaskRequest) returns (DeleteTaskResponse);
}

// AgentChat is a lightweight gRPC service exposed by the agent binary
// for interactive conversations over gRPC. It only implements chat
// and health, not the full Vassago daemon service.
service AgentChat {
  rpc ChatStream(ChatRequest) returns (stream ChatEvent);
  rpc Ping(HealthCheckRequest) returns (HealthCheckResponse);
}

// --- Messages ---

message MemoryEntry {
  string id = 1;
  string target = 2;         // "memory" or "user"
  string category = 3;       // environment, quirk, project, observation, user
  string key = 4;            // upsert key
  string content = 5;
  int32 priority = 6;         // 1-5, higher = more important
  string source_agent = 7;   // UUID of the agent that wrote this
  int64 created_at = 8;      // Unix timestamp
  int64 updated_at = 9;
  int64 accessed_at = 10;
  int64 expires_at = 11;     // 0 = no expiry
}

message AddMemoryRequest {
  string target = 1;
  string category = 2;
  string key = 3;
  string content = 4;
  int32 priority = 5;
  string source_agent = 6;
  int64 expires_at = 7;      // 0 = no expiry
}

message AddMemoryResponse {
  MemoryEntry entry = 1;
}

message GetMemoryRequest {
  string id = 1;
}

message UpdateMemoryRequest {
  string id = 1;
  optional string content = 2;
  optional int32 priority = 3;
  optional string category = 4;
  optional int64 expires_at = 5;
}

message RemoveMemoryRequest {
  string id = 1;
}

message RemoveMemoryResponse {
  bool deleted = 1;
}

message ListMemoriesRequest {
  string target = 1;         // "memory", "user", or "" for both
  optional string category = 2;
  optional string source_agent = 3;
  optional int32 min_priority = 4;
}

message MemoryList {
  repeated MemoryEntry entries = 1;
}

message SearchRequest {
  string query = 1;
  string target = 2;         // "memory", "user", or "" for both
  optional int32 limit = 3;
}

message SearchResponse {
  repeated MemoryEntry entries = 1;
}

message SearchSessionsRequest {
  string query = 1;
  optional int32 limit = 2;
}

message SearchSessionsResponse {
  repeated Session sessions = 1;
}

message ListSessionsRequest {
  optional int32 limit = 1;
}

message ListSessionsResponse {
  repeated Session sessions = 1;
}

// --- Hot Block ---

message HotBlockConfig {
  repeated string boost_categories = 1;
  repeated string suppress_categories = 2;
  int32 boost_priority = 3;         // priority >= this gets boosted
}

message HotBlockRequest {
  string target = 1;               // "memory" or "user"
  HotBlockConfig config = 2;
  string agent_id = 3;
  int32 char_limit = 4;
}

message HotBlockResponse {
  string content = 1;              // Formatted text for prompt injection
  int32 char_count = 2;
  int32 entry_count = 3;
  int64 computed_at = 4;           // Timestamp of computation
}

// --- Sessions ---

message Session {
  string id = 1;
  string agent_id = 2;
  string source = 3;               // "cli", "telegram", "cron", etc.
  string title = 4;
  int64 created_at = 5;
  int64 last_active_at = 6;
  int32 message_count = 7;
  repeated Message messages = 8;     // Only populated when include_messages = true
}

message Message {
  string role = 1;                 // "user", "assistant", "system", "tool"
  string content = 2;
  string tool_call_id = 3;
  string tool_name = 4;
  int64 timestamp = 5;
}

message CreateSessionRequest {
  string agent_id = 1;
  string source = 2;
  string title = 3;
}

message AddMessagesRequest {
  string session_id = 1;
  repeated Message messages = 2;
}

message EndSessionRequest {
  string session_id = 1;
}

message EndSessionResponse {
  bool ended = 1;
}

message GetSessionRequest {
  string session_id = 1;
  optional bool include_messages = 2;
}

// --- Consolidation ---

enum ConsolidateScope {
  CONSOLIDATE_SCOPE_UNSPECIFIED = 0;
  CONSOLIDATE_SCOPE_ALL = 1;
  CONSOLIDATE_SCOPE_OBSERVATIONS = 2;
  CONSOLIDATE_SCOPE_CATEGORY = 3;
  CONSOLIDATE_SCOPE_EXPIRED = 4;
}

message ConsolidateRequest {
  ConsolidateScope scope = 1;
  optional string category = 2;      // Required when scope = CATEGORY
  optional int32 batch_size = 3;      // Max candidates to return
}

message ConsolidateResponse {
  int32 removed = 1;
  int32 merged = 2;
  string summary = 3;                 // Human-readable summary of what was done
}

message GetConsolidationCandidatesRequest {
  ConsolidateScope scope = 1;
  optional string category = 2;
  optional int32 batch_size = 3;
}

message ConsolidationCandidate {
  MemoryEntry entry = 1;
  string reason = 2;                  // Why this entry is a candidate
}

message ConsolidationCandidatesResponse {
  repeated ConsolidationCandidate candidates = 1;
}

// --- Pub/Sub ---

message SubscribeRequest {
  string agent_id = 1;
  repeated string targets = 2;        // "memory", "user"
  repeated string categories = 3;     // Empty = all categories
  repeated string key_prefixes = 4;   // Empty = all keys
}

message UpdateEvent {
  enum EventType {
    EVENT_TYPE_UNSPECIFIED = 0;
    ADDED = 1;
    UPDATED = 2;
    REMOVED = 3;
    HOT_BLOCK_CHANGED = 4;
    CRON_FIRE = 5;           // A cron job fired
    TASK_STATUS_CHANGED = 6; // A task status changed
  }
  EventType event_type = 1;
  string target = 2;
  string category = 3;
  string key = 4;
  string agent_id = 5;       // Which agent made the change
  MemoryEntry entry = 6;     // The entry that changed (if ADDED/UPDATED)
  HotBlockResponse hot_block = 7; // Fresh hot block (if HOT_BLOCK_CHANGED)
  CronFireEvent cron_fire = 8;    // Cron job fire details (if CRON_FIRE)
  TaskEntry task = 9;             // Task that changed (if TASK_STATUS_CHANGED)
}

// CronFireEvent is published when a cron job fires.
// Agents subscribed to the appropriate target can receive this event
// and act on the job's message.
message CronFireEvent {
  string job_id = 1;         // The cron job ID
  string job_name = 2;       // Human-readable job name
  string schedule = 3;        // The cron schedule that triggered
  string agent_id = 4;       // The agent that owns this job
  string message = 5;         // The message/prompt for the agent
  int64 fired_at = 6;         // Unix timestamp when the job fired
  int64 next_fire_at = 7;     // When the job will fire next
}

message RegisterAgentRequest {
  string agent_id = 1;     // Client-assigned or empty for server-assigned
  string name = 2;         // Human-readable name ("studio-dev")
  string role = 3;         // "dev", "personal", "monitor"
}

message RegisterAgentResponse {
  string agent_id = 1;
  bool is_new = 2;        // True if this is a first-time agent
}

message AgentId {
  string agent_id = 1;
}

// Chat messages
message ChatRequest {
  string session_id = 1;   // Empty = create new session
  string agent_id = 2;
  string message = 3;
}

message ChatEvent {
  enum EventType {
    TEXT = 0;           // Streaming text chunk
    TOOL_START = 1;     // Agent is calling a tool
    TOOL_RESULT = 2;    // Tool call completed
    DONE = 3;           // Turn complete
    ERROR = 4;          // Error occurred
    THINKING = 5;       // Agent is processing (no output yet)
    USAGE = 6;          // Token usage info
  }
  EventType event_type = 1;
  string text = 2;           // For TEXT and ERROR events
  string tool_name = 3;      // For TOOL_START events
  string tool_result = 4;   // For TOOL_RESULT events
  string session_id = 5;    // Session ID (set on first event or DONE)
  int32 tokens_used = 6;    // For USAGE events
  int32 turn_number = 7;    // Current turn number
}

// Health check messages
message HealthCheckRequest {
  // Empty request
}

message HealthCheckResponse {
  string status = 1;
  string version = 2;
  int64 timestamp = 3;
}

message Empty {}
// --- Todo Service ---

message TodoItem {
  string id = 1;
  string content = 2;
  bool completed = 3;
  int32 priority = 4;       // 1-5, higher = more important
  string source_agent = 5;  // Agent that created the todo
  int64 created_at = 6;
  int64 updated_at = 7;
  int64 completed_at = 8;   // 0 = not completed
}

message AddTodoRequest {
  string content = 1;
  int32 priority = 2;
  string source_agent = 3;
}

message ListTodosRequest {
  bool include_completed = 1;  // Include completed todos (default: false)
  optional string source_agent = 2;  // Filter by agent
}

message CompleteTodoRequest {
  string id = 1;
}

message RemoveTodoRequest {
  string id = 1;
}

// --- Cron Service ---

// CronService manages scheduled recurring jobs that trigger agent actions.
// Jobs are stored durably in the daemon and fire at their scheduled intervals.
service CronService {
  // Create a new cron job
  rpc CreateCronJob(CreateCronJobRequest) returns (CronJob);
  // List cron jobs, optionally filtered by agent
  rpc ListCronJobs(ListCronJobsRequest) returns (CronJobList);
  // Update an existing cron job (partial update — only set fields are changed)
  rpc UpdateCronJob(UpdateCronJobRequest) returns (CronJob);
  // Delete a cron job
  rpc DeleteCronJob(DeleteCronJobRequest) returns (Empty);
}

message CronJob {
  string id = 1;                 // Unique job ID (auto-generated)
  string name = 2;               // Human-readable name
  string schedule = 3;            // Cron expression (e.g., "0 9 * * *")
  string agent_id = 4;           // Agent that owns this job
  string message = 5;            // Message to send the agent when job fires
  bool enabled = 6;              // Whether the job is active
  int64 created_at = 7;          // Unix timestamp
  int64 updated_at = 8;          // Unix timestamp
  int64 last_fire_at = 9;        // When the job last fired (0 = never)
  int64 next_fire_at = 10;       // When the job will fire next (0 = not scheduled)
}

message CreateCronJobRequest {
  string name = 1;               // Required: human-readable name
  string schedule = 2;           // Required: cron expression
  string agent_id = 3;           // Required: agent that owns this job
  string message = 4;           // Required: message to send when job fires
  optional bool enabled = 5;     // Default: true if not set
}

message ListCronJobsRequest {
  string agent_id = 1;           // Filter by agent (empty = all)
  bool include_disabled = 2;     // Include disabled jobs (default: false)
}

message CronJobList {
  repeated CronJob jobs = 1;
}

message UpdateCronJobRequest {
  string id = 1;                 // Required: job ID to update
  optional string name = 2;      // New name
  optional string schedule = 3;  // New schedule
  optional string message = 4;   // New message
  optional bool enabled = 5;     // Toggle enabled/disabled
}

message DeleteCronJobRequest {
  string id = 1;                 // Job ID to delete
}

// --- Skill Messages ---

message SkillEntry {
  string id = 1;
  string name = 2;               // Skill name
  string description = 3;        // Skill description
  repeated string triggers = 4; // Triggers that activate this skill
  string category = 5;           // Skill category
  string content = 6;            // Skill content/implementation
  string source_agent = 7;       // Agent that created this skill
  int32 priority = 8;            // Priority (1-5, higher = more important)
  int64 created_at = 9;          // Unix timestamp
  int64 updated_at = 10;         // Unix timestamp
}

message AddSkillRequest {
  string name = 1;               // Required: skill name
  string description = 2;        // Required: skill description
  repeated string triggers = 3; // Required: triggers
  string category = 4;           // Required: category
  string content = 5;            // Required: content
  string source_agent = 6;       // Required: source agent
  optional int32 priority = 7;   // Optional: priority (default: 3)
}

message GetSkillRequest {
  string id = 1;                 // Required: skill ID
}

message ListSkillsRequest {
  string category = 1;           // Filter by category (empty = all)
  string source_agent = 2;       // Filter by source agent (empty = all)
  optional int32 limit = 3;      // Limit results
}

message SkillList {
  repeated SkillEntry skills = 1;
}

message RemoveSkillRequest {
  string id = 1;                 // Required: skill ID to remove
}

message RemoveSkillResponse {
  bool success = 1;              // Whether removal was successful
}

message SearchSkillsRequest {
  string query = 1;              // Required: search query
  string category = 2;           // Filter by category (empty = all)
  optional int32 limit = 3;      // Limit results
}

// --- Saved Tool Messages ---

message SavedToolEntry {
  string id = 1;                        // UUID
  string name = 2;                       // Unique tool name (e.g., "calculate_natal_chart")
  string description = 3;               // LLM-readable description
  string type = 4;                       // "script" (only type in v1)
  string parameters = 5;                // JSON schema for inputs
  string script = 6;                     // Executable content (bash/python)
  string category = 7;                  // e.g., "astrology", "devops"
  repeated string triggers = 8;        // Trigger keywords for discovery
  string author = 9;                    // Agent ID that created it
  int32 priority = 10;                  // 1-5
  int32 version = 11;                   // Incremented on each update
  bool requires_approval_every_call = 12;  // true = ask every time, false = ask once
  int64 created_at = 13;               // Unix timestamp
  int64 updated_at = 14;               // Unix timestamp
}

message AddSavedToolRequest {
  string name = 1;                       // Required: unique tool name
  string description = 2;               // Required: LLM-readable description
  string type = 3;                       // Required: "script"
  string parameters = 4;                // Required: JSON schema
  string script = 5;                     // Required: executable content
  string category = 6;                  // Optional: category
  repeated string triggers = 7;        // Optional: trigger keywords
  string author = 8;                    // Required: agent ID
  optional int32 priority = 9;         // Optional: priority (default: 3)
}

message GetSavedToolRequest {
  string id = 1;                        // Required: tool ID
}

message ListSavedToolsRequest {
  string category = 1;                  // Filter by category (empty = all)
  string author = 2;                    // Filter by author (empty = all)
  optional int32 limit = 3;            // Limit results
}

message SavedToolList {
  repeated SavedToolEntry tools = 1;
}

message SearchSavedToolsRequest {
  string query = 1;                     // Required: search query
  string category = 2;                  // Filter by category (empty = all)
  optional int32 limit = 3;            // Limit results
}

message UpdateSavedToolRequest {
  string id = 1;                        // Required: tool ID to update
  optional string name = 2;            // New name
  optional string description = 3;     // New description
  optional string parameters = 4;       // New JSON schema
  optional string script = 5;           // New executable content
  optional string category = 6;        // New category
  repeated string triggers = 7;        // New triggers
  optional int32 priority = 8;         // New priority
  optional bool requires_approval_every_call = 9; // New approval requirement
}

message RemoveSavedToolRequest {
  string id = 1;                        // Required: tool ID to remove
}

message RemoveSavedToolResponse {
  bool removed = 1;                     // Whether removal was successful
}

// --- Peer Replication Messages ---

message SyncChangesRequest {
  string peer_id = 1;     // ID of the requesting peer
  string namespace = 2;   // Namespace to sync (maps to owner)
  int64 since = 3;        // Unix timestamp — only return entries updated after this
}

message SyncChangesResponse {
  repeated MemoryEntry entries = 1;  // Memory entries changed since the given timestamp
  int64 server_time = 2;             // Current server timestamp (for the peer's next since)
}


// --- Task Management Messages (Multi-Agent Orchestration) ---

message TaskEntry {
  string id = 1;
  string parent_ids = 2;              // JSON array of parent task IDs
  string status = 3;                  // ready, claimed, done, failed, dead_letter
  string agent_type = 4;
  string assigned_agent = 5;
  string goal = 6;
  string context = 7;                 // JSON: repo_path, tool config, etc.
  string result_key = 8;
  int32 priority = 9;
  int64 created_at = 10;
  int64 claimed_at = 11;
  int64 completed_at = 12;
  int32 ttl_seconds = 13;
  int32 retry_count = 14;
  int32 max_retries = 15;
}

message AddTaskRequest {
  string id = 1;
  string agent_type = 2;
  string goal = 3;
  string context = 4;                 // JSON, default "{}"
  int32 priority = 5;                 // default 3
  int32 ttl_seconds = 6;              // default 300
  int32 max_retries = 7;              // default 2
}

message GetTaskRequest {
  string id = 1;
}

message ClaimTaskRequest {
  string task_id = 1;
  string agent_id = 2;
}

message CompleteTaskRequest {
  string task_id = 1;
  string result_key = 2;
}

message FailTaskRequest {
  string task_id = 1;
}

message FindReadyTasksRequest {
  string agent_type = 1;              // empty = all agent types
  int32 limit = 2;                    // default 20
}

message ListTasksByStatusRequest {
  string status = 1;                  // empty = all statuses
  int32 limit = 2;                    // default 50
}

message TaskList {
  repeated TaskEntry tasks = 1;
}

message ResetTimedOutTasksRequest {
  // empty — scans all claimed tasks past TTL
}

message ResetTimedOutTasksResponse {
  repeated string reset_ids = 1;
  int32 count = 2;
}

message DeleteTaskRequest {
  string id = 1;
}

message DeleteTaskResponse {
  bool deleted = 1;
}
